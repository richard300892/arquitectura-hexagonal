server.port=8083
server.servlet.session.timeout=21600s
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:ALEDIESME}
spring.datasource.password=${DB_PASSWORD}
app.persistence.sql-dialect=oracle
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
# Allow startup without a live Oracle connection (connects on first JDBC use)
spring.datasource.hikari.initialization-fail-timeout=-1
app.security.jwt.secret=${JWT_SECRET}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
logging.level.com.alediesme=DEBUG
