server.port=${SERVER_PORT:8080}
# Produccion en WebLogic: DataSource administrado por JNDI
# Configuracion aplicada por ProdDataSourceConfig
spring.datasource.jndi-name=${DB_JNDI_NAME:jdbc/AlediesmeDS}
app.security.jwt.secret=${JWT_SECRET}
app.persistence.sql-dialect=oracle
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
# Logs: definir ruta absoluta en WebLogic con -DALEDIESME_LOG_PATH=...
logging.config=classpath:logback-spring.xml
logging.file.path=${ALEDIESME_LOG_PATH:./logs}
logging.level.com.alediesme=INFO
logging.level.com.alediesme.joyeria.shared.exception.GlobalExceptionHandler=ERROR
logging.level.root=INFO
# REST API sin WebSocket; evita auto-config que registra contenedor Tomcat WS
spring.websocket.enabled=false
