spring.application.name=alediesme
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.profiles.default=dev
server.servlet.context-path=/alediesme
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.persistence.sql-dialect=${SQL_DIALECT:common}
# Actuator
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true
info.app.name=${spring.application.name}
info.app.description=Alediesme Joyeria REST API
